<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas - Detalle del animal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f9f5f0;
            color: #2e1f0e;
            font-size: 15px;
            line-height: 1.6;
        }

        .adoptante-header {
            background: #5c3317;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .brand {
            color: #f9f5f0;
            font-size: 1.3rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn-logout {
            background: none;
            border: 1px solid #8b6340;
            color: #d4b896;
            padding: 5px 12px;
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .adoptante-main {
            max-width: 980px;
            margin: 0 auto;
            padding: 36px 28px;
        }

        .detail-box {
            background: #fff;
            border: 2px solid #c9a97a;
            padding: 32px;
            max-width: 700px;
            margin: 0 auto;
        }

        .detail-top {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .detail-emoji {
            font-size: 5rem;
        }

        .detail-info h3 {
            font-size: 1.6rem;
            color: #5c3317;
            margin-bottom: 6px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }

        .detail-table td {
            padding: 7px 10px;
            border-bottom: 1px solid #e8d8c4;
        }

        .detail-table td:first-child {
            color: #8b6340;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: bold;
            width: 190px;
        }

        .detail-story {
            font-size: 0.88rem;
            color: #4a3020;
            font-family: Arial, sans-serif;
            line-height: 1.65;
            border-top: 1px solid #e8d8c4;
            padding-top: 14px;
        }

        .detail-story strong {
            color: #5c3317;
        }

        .detail-actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .badge {
            font-size: 0.75rem;
            padding: 2px 9px;
            border: 1px solid;
            font-family: Arial, sans-serif;
            display: inline-block;
        }

        .badge-waiting {
            border-color: #d4892a;
            color: #7a4a00;
            background: #fdf3e3;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            font-family: Arial, sans-serif;
            font-size: 0.92rem;
            cursor: pointer;
            letter-spacing: 0.04em;
            text-decoration: none;
            display: inline-block;
        }

        .btn-green {
            background: #2e7d32;
            color: #fff;
        }

        .btn-green:hover {
            background: #246728;
        }

        .btn-secondary {
            background: #e8d8c4;
            color: #5c3317;
        }

        .btn-secondary:hover {
            background: #dcc5aa;
        }

        .not-found {
            background: #fff;
            border: 2px solid #c9a97a;
            padding: 32px;
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
        }

        .not-found h3 {
            color: #5c3317;
            margin-bottom: 12px;
        }

        .not-found p {
            font-family: Arial, sans-serif;
            color: #4a3020;
            margin-bottom: 18px;
        }

        @media (max-width: 768px) {
            .adoptante-header {
                padding: 14px 18px;
            }

            .adoptante-main {
                padding: 24px 16px;
            }

            .detail-box {
                padding: 24px;
            }

            .detail-top {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .detail-table td:first-child {
                width: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="adoptante-header">
        <span class="brand">🐾 Huellitas</span>
        <div class="header-right">
            <a href="galeria.html" class="btn-logout">← Regresar a la galería</a>
        </div>
    </div>

    <div class="adoptante-main">
        <div id="contenido-detalle"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://zafkalfoutcxookmdfqk.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_C3cL7nw2s_c2SPGMbP8R4A_SuCTkwzI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function obtenerIdDesdeURL() {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get('id'));
    }

    function obtenerEmoji(tipo) {
        if (!tipo) return "🐾";

        const t = tipo.toLowerCase();

        if (t.includes("gato")) return "🐱";
        if (t.includes("perro")) return "🐶";

        return "🐾";
    }

    async function renderDetalle() {
        const id = obtenerIdDesdeURL();
        const contenedor = document.getElementById('contenido-detalle');

        if (!id) {
            contenedor.innerHTML = `
                <div class="not-found">
                    <h3>ID inválido</h3>
                    <a href="galeria.html" class="btn btn-secondary">Volver</a>
                </div>
            `;
            return;
        }

        const { data, error } = await supabaseClient
            .from("mascotas")
            .select("*")
            .eq("id_mascota", id)
            .maybeSingle();

        if (error || !data) {
            contenedor.innerHTML = `
                <div class="not-found">
                    <h3>Animalito no encontrado</h3>
                    <p>No pudimos encontrar el perfil.</p>
                    <a href="galeria.html" class="btn btn-secondary">Volver</a>
                </div>
            `;
            return;
        }

        const emoji = obtenerEmoji(data.tipo);

        contenedor.innerHTML = `
            <div class="detail-box">
                <div class="detail-top">
                    <div class="detail-emoji">${emoji}</div>
                    <div class="detail-info">
                        <h3>${data.nombre}</h3>
                        <span class="badge badge-waiting">Disponible para adopción</span>
                    </div>
                </div>

                <table class="detail-table">
                    <tr><td>Tipo</td><td>${data.tipo || "No disponible"}</td></tr>
                    <tr><td>Edad</td><td>${data.edad || "No disponible"}</td></tr>
                    <tr><td>Raza</td><td>${data.raza || "No disponible"}</td></tr>
                    <tr><td>Sexo</td><td>${data.sexo || "No disponible"}</td></tr>
                </table>

                <div class="detail-story">
                    <strong>Descripción</strong><br>
                    ${data.descripcion || "Sin descripción"}
                    <br><br>
                    <strong>Historia</strong><br>
                    ${data.historia || "Sin historia registrada"}
                </div>

                <div class="detail-actions">
                    <a href="confirmacion-adopcion.html?id=${data.id_mascota}" class="btn btn-green">
                        🏡 Quiero adoptar a ${data.nombre}
                    </a>
                    <a href="galeria.html" class="btn btn-secondary">← Regresar</a>
                </div>
            </div>
        `;
    }

    renderDetalle();
</script>

</body>
</html>
